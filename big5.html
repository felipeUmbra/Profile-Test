<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Five Personality Test</title>
    <link href="./output.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/main.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-[80vw] w-full bg-white p-8 md:p-12 rounded-2xl shadow-2xl transition duration-500">
        
        <div class="flex justify-between items-center mb-4">
            <a href="index.html" id="back-btn" class="px-4 py-2 bg-gray-500 text-white font-bold rounded-lg hover:bg-gray-600 transition duration-300">
                ← Back to Home
            </a>
            <div class="flex space-x-2">
                <button onclick="setLanguage('en')" class="lang-button p-1 rounded hover:bg-gray-100">
                    <img src="https://placehold.co/24x16/000000/FFFFFF?text=EN" alt="English" title="English" class="rounded shadow">
                </button>
                <button onclick="setLanguage('pt')" class="lang-button p-1 rounded hover:bg-gray-100">
                    <img src="https://placehold.co/24x16/000000/FFFFFF?text=BR" alt="Português" title="Português (Brasil)" class="rounded shadow">
                </button>
                <button onclick="setLanguage('es')" class="lang-button p-1 rounded hover:bg-gray-100">
                    <img src="https://placehold.co/24x16/000000/FFFFFF?text=ES" alt="Español" title="Español" class="rounded shadow">
                </button>
            </div>
        </div>

        <header class="text-center mb-8">
            <h1 id="header-title" class="text-4xl font-extrabold text-gray-800">Big Five Personality Test</h1>
            <p id="header-subtitle" class="text-gray-500 mt-2">Rate how much each statement describes you (1 = Strongly Disagree, 5 = Strongly Agree)</p>
        </header>

        <div id="test-container">

            <div class="mb-8">
                <div id="question-counter" class="text-sm font-medium text-indigo-600 mb-1">Question 1 of 40</div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden shadow-inner">
                    <div id="progress-bar" class="bg-indigo-500 h-2.5 rounded-full progress-bar-inner" style="width: 0%"></div>
                </div>
            </div>

            <div id="question-container">
                <div class="text-center p-8 text-gray-500">Loading test...</div>
            </div>

        </div>

        <div id="results-container" class="hidden">
            <div id="results-content">
                </div>
             <div class="mt-8 mx-auto w-full md:w-2/3 h-64">
                <canvas id="resultsChart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
